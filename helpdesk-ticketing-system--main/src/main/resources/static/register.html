<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

<h2>Register</h2>

<input id="name" class="form-control mt-2" placeholder="Name">
<input id="email" class="form-control mt-2" placeholder="Email">
<input id="passwordHash" type="password" class="form-control mt-2" placeholder="Password">

<select id="role" class="form-control mt-2">
    <option>END_USER</option>
    <option>AGENT</option>
    <option>ADMIN</option>
</select>

<button onclick="register()" class="btn btn-success mt-3">Register</button>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>

</body>
</html>
