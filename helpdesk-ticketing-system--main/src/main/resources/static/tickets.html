<!DOCTYPE html>
<html>
<head>
    <title>Tickets</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

<h2>Create Ticket</h2>

<input id="title" class="form-control mt-2" placeholder="Title">
<input id="description" class="form-control mt-2" placeholder="Description">

<select id="priority" class="form-control mt-2">
    <option>LOW</option>
    <option>MEDIUM</option>
    <option>HIGH</option>
    <option>CRITICAL</option>
</select>

<input id="userId" class="form-control mt-2" placeholder="User ID">

<button onclick="createTicket()" class="btn btn-primary mt-3">Create</button>

<hr>

<h3>All Tickets</h3>

<table class="table">
    <thead>
        <tr>
            <th>ID</th><th>Title</th><th>Status</th>
        </tr>
    </thead>
    <tbody id="ticketTable"></tbody>
</table>

<script src="js/api.js"></script>
<script src="js/tickets.js"></script>

<script>loadTickets()</script>

</body>
</html>
