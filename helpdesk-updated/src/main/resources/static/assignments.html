<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Assignments — HelpDesk</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="css/app.css" rel="stylesheet"/>
</head>
<body class="app-layout">

<div id="sidebar"></div>

<div id="main">
  <div id="topbar">
    <button class="btn btn-sm btn-outline-secondary d-md-none" id="sidebarToggler">
      <i class="bi bi-list fs-5"></i>
    </button>
    <span class="page-title">Assignments</span>
    <button class="btn btn-primary btn-sm ms-auto" data-bs-toggle="modal" data-bs-target="#assignModal">
      <i class="bi bi-person-check me-1"></i>Assign Ticket
    </button>
  </div>

  <div id="content">
    <div class="card table-card">
      <div class="card-header"><span class="fw-semibold">All Assignments</span></div>
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th>#</th>
              <th>Ticket</th>
              <th>Assigned To</th>
              <th>Assigned Date</th>
            </tr>
          </thead>
          <tbody id="assignTableBody">
            <tr><td colspan="4" class="text-center py-4 text-muted">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Assign Modal -->
<div class="modal fade" id="assignModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Assign Ticket to Agent</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="assignForm" novalidate>
          <div class="mb-3">
            <label class="form-label fw-semibold">Ticket <span class="text-danger">*</span></label>
            <select id="ticketId" class="form-select" required>
              <option value="">Select a ticket…</option>
            </select>
          </div>
          <div class="mb-1">
            <label class="form-label fw-semibold">Agent <span class="text-danger">*</span></label>
            <select id="agentId" class="form-select" required>
              <option value="">Select an agent…</option>
            </select>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary" id="saveAssignBtn">Assign</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
<script>
const assignModalEl = new bootstrap.Modal(document.getElementById('assignModal'));

(async () => {
  const user = await requireAuth();
  if (!user || user.role !== 'ADMIN') { window.location.href = 'dashboard.html'; return; }
  buildSidebar(user, 'assignments');

  const loadAssignments = async () => {
    const assignments = await API.get('/api/assignments');
    const tbody = document.getElementById('assignTableBody');
    if (!assignments.length) {
      tbody.innerHTML = '<tr><td colspan="4" class="text-center py-4 text-muted">No assignments yet.</td></tr>';
      return;
    }
    tbody.innerHTML = assignments.map(a => `
      <tr>
        <td>${a.assignmentId}</td>
        <td>
          <a href="ticket-detail.html?id=${a.ticket?.ticketId}" class="text-decoration-none fw-semibold">
            #${a.ticket?.ticketId} — ${a.ticket?.title || '?'}
          </a>
          <div>${statusBadge(a.ticket?.status)}</div>
        </td>
        <td>
          <div class="fw-semibold">${a.assignedTo?.name || '—'}</div>
          <div class="text-muted small">${a.assignedTo?.email || ''}</div>
        </td>
        <td class="text-muted small">${fmtDate(a.assignedDate)}</td>
      </tr>`).join('');
  };

  await loadAssignments();

  // Pre-load tickets and agents for modal
  document.getElementById('assignModal').addEventListener('show.bs.modal', async () => {
    try {
      const [tickets, users] = await Promise.all([
        API.get('/api/tickets'),
        API.get('/api/users')
      ]);
      const ticketSel = document.getElementById('ticketId');
      const agentSel = document.getElementById('agentId');
      ticketSel.innerHTML = '<option value="">Select a ticket…</option>' +
        tickets.filter(t => t.status === 'OPEN' || t.status === 'IN_PROGRESS')
          .map(t => `<option value="${t.ticketId}">#${t.ticketId} — ${t.title}</option>`).join('');
      agentSel.innerHTML = '<option value="">Select an agent…</option>' +
        users.filter(u => u.role === 'AGENT' || u.role === 'ADMIN')
          .map(u => `<option value="${u.userId}">${u.name} (${u.role})</option>`).join('');
    } catch(e) { /* ignore */ }
  });

  document.getElementById('saveAssignBtn').addEventListener('click', async () => {
    const form = document.getElementById('assignForm');
    if (!form.checkValidity()) { form.classList.add('was-validated'); return; }
    try {
      await API.post('/api/assignments', {
        ticketId: parseInt(document.getElementById('ticketId').value),
        agentId:  parseInt(document.getElementById('agentId').value),
      });
      assignModalEl.hide();
      showToast('Ticket assigned successfully!');
      await loadAssignments();
    } catch(e) {
      showToast('Assignment failed: ' + e.message, 'danger');
    }
  });
})();
</script>
</body>
</html>
