<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tickets — HelpDesk</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="css/app.css" rel="stylesheet"/>
</head>
<body class="app-layout">

<div id="sidebar"></div>

<div id="main">
  <div id="topbar">
    <button class="btn btn-sm btn-outline-secondary d-md-none" id="sidebarToggler">
      <i class="bi bi-list fs-5"></i>
    </button>
    <span class="page-title">Tickets</span>
    <a href="ticket-form.html" class="btn btn-primary btn-sm ms-auto">
      <i class="bi bi-plus-lg me-1"></i>New Ticket
    </a>
  </div>

  <div id="content">
    <!-- Filters -->
    <div class="card border-0 shadow-sm mb-3 p-3">
      <div class="row g-2 align-items-end">
        <div class="col-md-4">
          <input type="text" id="searchInput" class="form-control" placeholder="Search by title…"/>
        </div>
        <div class="col-md-3">
          <select id="statusFilter" class="form-select">
            <option value="">All Statuses</option>
            <option>OPEN</option>
            <option>IN_PROGRESS</option>
            <option>RESOLVED</option>
            <option>CLOSED</option>
          </select>
        </div>
        <div class="col-md-3">
          <select id="priorityFilter" class="form-select">
            <option value="">All Priorities</option>
            <option>LOW</option>
            <option>MEDIUM</option>
            <option>HIGH</option>
            <option>CRITICAL</option>
          </select>
        </div>
        <div class="col-md-2">
          <button class="btn btn-outline-secondary w-100" id="clearFilters">
            <i class="bi bi-x-circle me-1"></i>Clear
          </button>
        </div>
      </div>
    </div>

    <!-- Table -->
    <div class="card table-card">
      <div class="card-header d-flex align-items-center justify-content-between">
        <span class="fw-semibold">All Tickets</span>
        <span id="ticketCount" class="badge bg-secondary">0</span>
      </div>
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th>#ID</th>
              <th>Title</th>
              <th>Reported By</th>
              <th>Priority</th>
              <th>Status</th>
              <th>Created</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="ticketTableBody">
            <tr><td colspan="7" class="text-center py-4 text-muted">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Delete Confirm Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title text-danger"><i class="bi bi-trash me-2"></i>Delete Ticket</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">Are you sure you want to delete ticket <strong id="deleteTicketTitle"></strong>?</div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-danger" id="confirmDelete">Delete</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
<script>
let allTickets = [];
let currentUser = null;
let deleteId = null;
const deleteModal = new bootstrap.Modal(document.getElementById('deleteModal'));

function renderTable(tickets) {
  document.getElementById('ticketCount').textContent = tickets.length;
  const tbody = document.getElementById('ticketTableBody');
  if (tickets.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" class="text-center py-4 text-muted">No tickets match your filters.</td></tr>';
    return;
  }
  const isAdmin = currentUser.role === 'ADMIN';
  const isAgent = currentUser.role === 'AGENT' || isAdmin;
  tbody.innerHTML = tickets.map(t => `
    <tr>
      <td><span class="text-primary fw-semibold">#${t.ticketId}</span></td>
      <td>
        <div class="fw-semibold">${t.title}</div>
        <div class="text-muted small text-truncate" style="max-width:220px;">${t.description}</div>
      </td>
      <td>${t.user ? t.user.name : '—'}</td>
      <td>${priorityBadge(t.priority)}</td>
      <td>${statusBadge(t.status)}</td>
      <td class="text-muted small">${fmtDate(t.createdDate)}</td>
      <td>
        <div class="d-flex gap-1">
          <a href="ticket-detail.html?id=${t.ticketId}" class="btn btn-sm btn-outline-primary" title="View">
            <i class="bi bi-eye"></i>
          </a>
          ${isAgent ? `<a href="ticket-form.html?id=${t.ticketId}" class="btn btn-sm btn-outline-secondary" title="Edit">
            <i class="bi bi-pencil"></i>
          </a>` : ''}
          ${isAdmin ? `<button class="btn btn-sm btn-outline-danger" title="Delete"
              onclick="confirmDelete(${t.ticketId}, '${t.title.replace(/'/g, "\\'")}')">
            <i class="bi bi-trash"></i>
          </button>` : ''}
        </div>
      </td>
    </tr>`).join('');
}

function applyFilters() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const status = document.getElementById('statusFilter').value;
  const priority = document.getElementById('priorityFilter').value;
  renderTable(allTickets.filter(t =>
    (!search || t.title.toLowerCase().includes(search) || t.description.toLowerCase().includes(search)) &&
    (!status || t.status === status) &&
    (!priority || t.priority === priority)
  ));
}

function confirmDelete(id, title) {
  deleteId = id;
  document.getElementById('deleteTicketTitle').textContent = `"${title}"`;
  deleteModal.show();
}

(async () => {
  currentUser = await requireAuth();
  if (!currentUser) return;
  buildSidebar(currentUser, 'tickets');

  try {
    if (currentUser.role === 'END_USER') {
      allTickets = await API.get(`/api/tickets/user/${currentUser.userId}`);
    } else {
      allTickets = await API.get('/api/tickets');
    }
    renderTable(allTickets);
  } catch(e) {
    showToast('Failed to load tickets: ' + e.message, 'danger');
  }

  document.getElementById('searchInput').addEventListener('input', applyFilters);
  document.getElementById('statusFilter').addEventListener('change', applyFilters);
  document.getElementById('priorityFilter').addEventListener('change', applyFilters);
  document.getElementById('clearFilters').addEventListener('click', () => {
    document.getElementById('searchInput').value = '';
    document.getElementById('statusFilter').value = '';
    document.getElementById('priorityFilter').value = '';
    renderTable(allTickets);
  });

  document.getElementById('confirmDelete').addEventListener('click', async () => {
    try {
      await API.delete(`/api/tickets/${deleteId}`);
      deleteModal.hide();
      allTickets = allTickets.filter(t => t.ticketId !== deleteId);
      applyFilters();
      showToast('Ticket deleted successfully.');
    } catch(e) {
      showToast('Delete failed: ' + e.message, 'danger');
    }
  });
})();
</script>
</body>
</html>
