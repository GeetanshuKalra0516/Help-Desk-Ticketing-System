<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ticket Detail — HelpDesk</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="css/app.css" rel="stylesheet"/>
</head>
<body class="app-layout">

<div id="sidebar"></div>

<div id="main">
  <div id="topbar">
    <button class="btn btn-sm btn-outline-secondary d-md-none" id="sidebarToggler">
      <i class="bi bi-list fs-5"></i>
    </button>
    <span class="page-title">Ticket Detail</span>
    <div class="ms-auto d-flex gap-2">
      <a href="tickets.html" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-arrow-left me-1"></i>Back
      </a>
      <a id="editBtn" href="#" class="btn btn-primary btn-sm d-none">
        <i class="bi bi-pencil me-1"></i>Edit
      </a>
    </div>
  </div>

  <div id="content">
    <div id="ticketDetail" class="row g-3">
      <div class="col-12 text-center py-5 text-muted">Loading ticket…</div>
    </div>
  </div>
</div>

<!-- Quick Status Update Modal -->
<div class="modal fade" id="statusModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-sm">
    <div class="modal-content">
      <div class="modal-header">
        <h6 class="modal-title">Update Status</h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <select id="newStatus" class="form-select">
          <option value="OPEN">Open</option>
          <option value="IN_PROGRESS">In Progress</option>
          <option value="RESOLVED">Resolved</option>
          <option value="CLOSED">Closed</option>
        </select>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary btn-sm" id="saveStatus">Save</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
<script>
let ticket = null;
let currentUser = null;
const statusModal = new bootstrap.Modal(document.getElementById('statusModal'));

(async () => {
  currentUser = await requireAuth();
  if (!currentUser) return;
  buildSidebar(currentUser, 'tickets');

  const params = new URLSearchParams(location.search);
  const ticketId = params.get('id');
  if (!ticketId) { window.location.href = 'tickets.html'; return; }

  const isAdmin = currentUser.role === 'ADMIN';
  const isAgent = currentUser.role === 'AGENT' || isAdmin;

  if (isAgent) {
    document.getElementById('editBtn').href = `ticket-form.html?id=${ticketId}`;
    document.getElementById('editBtn').classList.remove('d-none');
  }

  try {
    ticket = await API.get(`/api/tickets/${ticketId}`);
    renderDetail(ticket, isAdmin, isAgent);
  } catch(e) {
    showToast('Failed to load ticket: ' + e.message, 'danger');
  }

  document.getElementById('saveStatus').addEventListener('click', async () => {
    const newStatus = document.getElementById('newStatus').value;
    try {
      await API.patch(`/api/tickets/${ticketId}/status?status=${newStatus}`);
      ticket.status = newStatus;
      statusModal.hide();
      renderDetail(ticket, isAdmin, isAgent);
      showToast('Status updated!');
    } catch(e) {
      showToast('Failed to update status: ' + e.message, 'danger');
    }
  });
})();

function renderDetail(t, isAdmin, isAgent) {
  document.getElementById('newStatus').value = t.status;
  document.getElementById('ticketDetail').innerHTML = `
    <div class="col-lg-8">
      <div class="card border-0 shadow-sm mb-3">
        <div class="card-body p-4">
          <div class="d-flex align-items-start justify-content-between mb-3">
            <div>
              <span class="text-muted small">#${t.ticketId}</span>
              <h5 class="fw-bold mb-1">${t.title}</h5>
              <div class="d-flex gap-2 flex-wrap">
                ${statusBadge(t.status)}
                ${priorityBadge(t.priority)}
              </div>
            </div>
            ${isAgent ? `<button class="btn btn-outline-secondary btn-sm" onclick="openStatusModal()">
              <i class="bi bi-pencil me-1"></i>Status
            </button>` : ''}
          </div>
          <hr/>
          <p class="mb-0" style="white-space:pre-wrap;">${t.description}</p>
        </div>
      </div>
    </div>

    <div class="col-lg-4">
      <div class="card border-0 shadow-sm mb-3">
        <div class="card-body">
          <h6 class="fw-semibold mb-3 text-muted text-uppercase" style="font-size:.75rem;letter-spacing:.06em;">Details</h6>
          <dl class="row mb-0 small">
            <dt class="col-5 text-muted">Reported by</dt>
            <dd class="col-7 fw-semibold">${t.user ? t.user.name : '—'}</dd>
            <dt class="col-5 text-muted">Email</dt>
            <dd class="col-7">${t.user ? t.user.email : '—'}</dd>
            <dt class="col-5 text-muted">Created</dt>
            <dd class="col-7">${fmtDate(t.createdDate)}</dd>
            <dt class="col-5 text-muted">Updated</dt>
            <dd class="col-7">${fmtDate(t.updatedDate)}</dd>
          </dl>
        </div>
      </div>
    </div>`;
}

function openStatusModal() { statusModal.show(); }
</script>
</body>
</html>
