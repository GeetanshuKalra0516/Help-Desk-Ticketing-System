<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Resolutions — HelpDesk</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="css/app.css" rel="stylesheet"/>
</head>
<body class="app-layout">

<div id="sidebar"></div>

<div id="main">
  <div id="topbar">
    <button class="btn btn-sm btn-outline-secondary d-md-none" id="sidebarToggler">
      <i class="bi bi-list fs-5"></i>
    </button>
    <span class="page-title">Resolutions</span>
    <button class="btn btn-primary btn-sm ms-auto" data-bs-toggle="modal" data-bs-target="#resolveModal">
      <i class="bi bi-check2-circle me-1"></i>Resolve Ticket
    </button>
  </div>

  <div id="content">
    <div class="card table-card">
      <div class="card-header"><span class="fw-semibold">All Resolutions</span></div>
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th>#</th>
              <th>Ticket</th>
              <th>Resolved By</th>
              <th>Notes</th>
              <th>Resolved Date</th>
            </tr>
          </thead>
          <tbody id="resolveTableBody">
            <tr><td colspan="5" class="text-center py-4 text-muted">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Resolve Modal -->
<div class="modal fade" id="resolveModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Resolve a Ticket</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="resolveForm" novalidate>
          <div class="mb-3">
            <label class="form-label fw-semibold">Ticket <span class="text-danger">*</span></label>
            <select id="ticketId" class="form-select" required>
              <option value="">Select a ticket…</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Resolution Notes <span class="text-danger">*</span></label>
            <textarea id="resolutionNotes" class="form-control" rows="4" required
                      placeholder="Describe how the issue was resolved…"></textarea>
            <div class="invalid-feedback">Notes are required.</div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-success" id="saveResolveBtn">Mark Resolved</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
<script>
const resolveModalEl = new bootstrap.Modal(document.getElementById('resolveModal'));

(async () => {
  const user = await requireAuth();
  if (!user || (user.role !== 'ADMIN' && user.role !== 'AGENT')) {
    window.location.href = 'dashboard.html'; return;
  }
  buildSidebar(user, 'resolutions');

  const load = async () => {
    const resolutions = await API.get('/api/resolutions');
    const tbody = document.getElementById('resolveTableBody');
    if (!resolutions.length) {
      tbody.innerHTML = '<tr><td colspan="5" class="text-center py-4 text-muted">No resolutions yet.</td></tr>';
      return;
    }
    tbody.innerHTML = resolutions.map(r => `
      <tr>
        <td>${r.resolutionId}</td>
        <td>
          <a href="ticket-detail.html?id=${r.ticket?.ticketId}" class="text-decoration-none fw-semibold">
            #${r.ticket?.ticketId} — ${r.ticket?.title || '?'}
          </a>
        </td>
        <td>
          <div class="fw-semibold">${r.resolvedBy?.name || '—'}</div>
          <div class="text-muted small">${r.resolvedBy?.email || ''}</div>
        </td>
        <td class="small" style="max-width:260px;">${r.resolutionNotes || '—'}</td>
        <td class="text-muted small">${fmtDate(r.resolvedDate)}</td>
      </tr>`).join('');
  };

  await load();

  document.getElementById('resolveModal').addEventListener('show.bs.modal', async () => {
    const tickets = await API.get('/api/tickets');
    const sel = document.getElementById('ticketId');
    sel.innerHTML = '<option value="">Select a ticket…</option>' +
      tickets.filter(t => t.status !== 'RESOLVED' && t.status !== 'CLOSED')
        .map(t => `<option value="${t.ticketId}">#${t.ticketId} — ${t.title}</option>`).join('');
  });

  document.getElementById('saveResolveBtn').addEventListener('click', async () => {
    const form = document.getElementById('resolveForm');
    if (!form.checkValidity()) { form.classList.add('was-validated'); return; }
    try {
      await API.post('/api/resolutions', {
        ticketId: parseInt(document.getElementById('ticketId').value),
        userId: user.userId,
        resolutionNotes: document.getElementById('resolutionNotes').value.trim(),
      });
      resolveModalEl.hide();
      form.reset();
      showToast('Ticket resolved!');
      await load();
    } catch(e) {
      showToast('Failed: ' + e.message, 'danger');
    }
  });
})();
</script>
</body>
</html>
