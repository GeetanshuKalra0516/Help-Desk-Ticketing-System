<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HelpDesk — Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="css/app.css" rel="stylesheet"/>
</head>
<body class="bg-light d-flex align-items-center justify-content-center min-vh-100">

<div class="card shadow-sm border-0" style="width:420px;">
  <div class="card-body p-5">
    <div class="text-center mb-4">
      <div class="bg-primary rounded-circle d-inline-flex align-items-center justify-content-center mb-3"
           style="width:56px;height:56px;">
        <i class="bi bi-headset fs-4 text-white"></i>
      </div>
      <h4 class="fw-bold mb-0">HelpDesk</h4>
      <p class="text-muted small">Ticketing System</p>
    </div>

    <div id="alertBox" class="d-none"></div>

    <form id="loginForm" method="POST" action="/auth/login">
      <div class="mb-3">
        <label class="form-label fw-semibold">Email address</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input type="email" name="email" class="form-control" placeholder="you@example.com" required/>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" id="passwordInput" class="form-control" placeholder="••••••••" required/>
          <button type="button" class="btn btn-outline-secondary" id="togglePwd">
            <i class="bi bi-eye" id="eyeIcon"></i>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
        <span id="btnText">Sign In</span>
        <span id="btnSpinner" class="spinner-border spinner-border-sm ms-2 d-none" role="status"></span>
      </button>
    </form>

    <div class="text-center mt-3">
      <small class="text-muted">Default admin: <code>admin@helpdesk.com</code> / <code>admin123</code></small>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // Show error/success from URL params
  const params = new URLSearchParams(location.search);
  const alertBox = document.getElementById('alertBox');
  if (params.has('error')) {
    alertBox.className = 'alert alert-danger';
    alertBox.textContent = 'Invalid email or password. Please try again.';
  } else if (params.has('logout')) {
    alertBox.className = 'alert alert-success';
    alertBox.textContent = 'You have been logged out successfully.';
  } else if (params.has('expired')) {
    alertBox.className = 'alert alert-warning';
    alertBox.textContent = 'Your session has expired. Please log in again.';
  } else {
    alertBox.classList.add('d-none');
  }

  // Toggle password visibility
  document.getElementById('togglePwd').addEventListener('click', () => {
    const input = document.getElementById('passwordInput');
    const icon = document.getElementById('eyeIcon');
    if (input.type === 'password') {
      input.type = 'text';
      icon.className = 'bi bi-eye-slash';
    } else {
      input.type = 'password';
      icon.className = 'bi bi-eye';
    }
  });

  // Show spinner on submit
  document.getElementById('loginForm').addEventListener('submit', () => {
    document.getElementById('btnText').textContent = 'Signing in…';
    document.getElementById('btnSpinner').classList.remove('d-none');
  });

  // Redirect if already logged in
  fetch('/auth/me').then(r => {
    if (r.ok) window.location.href = '/dashboard.html';
  });
</script>
</body>
</html>
