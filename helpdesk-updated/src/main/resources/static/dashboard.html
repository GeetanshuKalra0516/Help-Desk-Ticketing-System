<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — HelpDesk</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="css/app.css" rel="stylesheet"/>
</head>
<body class="app-layout">

<div id="sidebar"></div>

<div id="main">
  <div id="topbar">
    <button class="btn btn-sm btn-outline-secondary d-md-none" id="sidebarToggler">
      <i class="bi bi-list fs-5"></i>
    </button>
    <span class="page-title">Dashboard</span>
    <span class="text-muted small" id="greeting"></span>
  </div>

  <div id="content">
    <!-- Stats Row -->
    <div class="row g-3 mb-4">
      <div class="col-6 col-lg-3">
        <div class="card stat-card p-3">
          <div class="d-flex align-items-center gap-3">
            <div class="stat-icon bg-primary bg-opacity-10">
              <i class="bi bi-ticket-detailed text-primary fs-5"></i>
            </div>
            <div>
              <div class="fs-4 fw-bold" id="totalTickets">—</div>
              <div class="text-muted small">Total Tickets</div>
            </div>
          </div>
        </div>
      </div>
      <div class="col-6 col-lg-3">
        <div class="card stat-card p-3">
          <div class="d-flex align-items-center gap-3">
            <div class="stat-icon bg-warning bg-opacity-10">
              <i class="bi bi-clock-history text-warning fs-5"></i>
            </div>
            <div>
              <div class="fs-4 fw-bold" id="openTickets">—</div>
              <div class="text-muted small">Open</div>
            </div>
          </div>
        </div>
      </div>
      <div class="col-6 col-lg-3">
        <div class="card stat-card p-3">
          <div class="d-flex align-items-center gap-3">
            <div class="stat-icon bg-info bg-opacity-10">
              <i class="bi bi-arrow-repeat text-info fs-5"></i>
            </div>
            <div>
              <div class="fs-4 fw-bold" id="inProgressTickets">—</div>
              <div class="text-muted small">In Progress</div>
            </div>
          </div>
        </div>
      </div>
      <div class="col-6 col-lg-3">
        <div class="card stat-card p-3">
          <div class="d-flex align-items-center gap-3">
            <div class="stat-icon bg-success bg-opacity-10">
              <i class="bi bi-check2-circle text-success fs-5"></i>
            </div>
            <div>
              <div class="fs-4 fw-bold" id="resolvedTickets">—</div>
              <div class="text-muted small">Resolved</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Recent Tickets Table -->
    <div class="card table-card mb-4">
      <div class="card-header d-flex align-items-center justify-content-between">
        <span class="fw-semibold">Recent Tickets</span>
        <a href="tickets.html" class="btn btn-sm btn-outline-primary">View All</a>
      </div>
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th>#</th>
              <th>Title</th>
              <th>Priority</th>
              <th>Status</th>
              <th>Created</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="recentTicketsBody">
            <tr><td colspan="6" class="text-center py-4 text-muted">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
<script>
(async () => {
  const user = await requireAuth();
  if (!user) return;
  buildSidebar(user, 'dashboard');

  const hour = new Date().getHours();
  const greet = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
  document.getElementById('greeting').textContent = `${greet}, ${user.name}`;

  try {
    // Load tickets based on role
    let tickets = [];
    if (user.role === 'END_USER') {
      tickets = await API.get(`/api/tickets/user/${user.userId}`);
    } else {
      tickets = await API.get('/api/tickets');
    }

    document.getElementById('totalTickets').textContent = tickets.length;
    document.getElementById('openTickets').textContent = tickets.filter(t => t.status === 'OPEN').length;
    document.getElementById('inProgressTickets').textContent = tickets.filter(t => t.status === 'IN_PROGRESS').length;
    document.getElementById('resolvedTickets').textContent = tickets.filter(t => t.status === 'RESOLVED').length;

    const recent = tickets.slice(-5).reverse();
    const tbody = document.getElementById('recentTicketsBody');
    if (recent.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4 text-muted">No tickets found.</td></tr>';
    } else {
      tbody.innerHTML = recent.map(t => `
        <tr>
          <td><span class="text-muted">#${t.ticketId}</span></td>
          <td class="fw-semibold">${t.title}</td>
          <td>${priorityBadge(t.priority)}</td>
          <td>${statusBadge(t.status)}</td>
          <td class="text-muted small">${fmtDate(t.createdDate)}</td>
          <td>
            <a href="ticket-detail.html?id=${t.ticketId}" class="btn btn-sm btn-outline-secondary">
              <i class="bi bi-eye"></i>
            </a>
          </td>
        </tr>`).join('');
    }
  } catch(e) {
    showToast('Failed to load dashboard data: ' + e.message, 'danger');
  }
})();
</script>
</body>
</html>
